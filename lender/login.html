<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lender Login - Daily Payment Loan Tracker</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="center" style="margin-top:40px;">
      <h1>Lender Access</h1>
      <p class="muted">Create an account or log in to manage your clients.</p>
    </div>

    <div class="card" style="max-width:420px; margin:24px auto;">
      <div class="tabs">
        <button type="button" id="tabLogin" class="active">Log In</button>
        <button type="button" id="tabSignup">Create Account</button>
      </div>

      <p class="error" id="formError" hidden></p>

      <form id="loginForm" class="stack">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required autocomplete="current-password" />
        </div>
        <button type="submit">Log In</button>
      </form>

      <form id="signupForm" class="stack" hidden>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required minlength="6" autocomplete="new-password" />
          <p class="muted" style="margin:6px 0 0; font-size:0.82rem;">At least 6 characters.</p>
        </div>
        <button type="submit">Create Account</button>
      </form>
    </div>

    <p class="center muted"><a href="../index.html">&larr; Back to start</a></p>
  </div>

  <script type="module" src="../assets/js/lender-login.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Details - Daily Payment Loan Tracker</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Daily Payment Loan Tracker</h1>
    <div class="row-actions">
      <a href="dashboard.html" class="btn secondary">Dashboard</a>
      <button id="logoutBtn" type="button" class="secondary">Log Out</button>
    </div>
  </header>

  <div class="page">
    <p class="error" id="pageError" hidden></p>

    <div id="content" hidden>
      <div class="center" style="margin-bottom:10px;">
        <h2 id="clientName" style="margin-bottom:4px;"></h2>
        <span id="statusBadge"></span>
      </div>

      <div class="card">
        <div class="loan-summary">
          <div class="stat">
            <div class="label">Principal + Interest</div>
            <div class="value" id="principalInterest"></div>
          </div>
          <div class="stat">
            <div class="label">Total Payable</div>
            <div class="value" id="totalPayable"></div>
          </div>
          <div class="stat">
            <div class="label">Remaining Payable</div>
            <div class="value" id="remainingPayable"></div>
          </div>
          <div class="stat">
            <div class="label">Due Date</div>
            <div class="value" id="dueDate"></div>
          </div>
        </div>
      </div>

      <h3>Payment History</h3>
      <p class="muted" id="noPayments" hidden>No payments logged yet.</p>
      <div class="card" id="tableCard" hidden style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Amount</th>
              <th>Remaining Payable</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="paymentsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="../assets/js/lender-client-detail.js"></script>
</body>
</html>
